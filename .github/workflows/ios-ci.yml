name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
        
    - name: Cache SPM
      uses: actions/cache@v3
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Resolve Package Dependencies
      run: xcodebuild -resolvePackageDependencies -project Intentional.xcodeproj -scheme Intentional
      
    - name: Build
      run: |
        xcodebuild build \
          -project Intentional.xcodeproj \
          -scheme Intentional \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
          -configuration Debug \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Run Tests
      run: |
        xcodebuild test \
          -project Intentional.xcodeproj \
          -scheme Intentional \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
          -configuration Debug \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Archive Logs
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: ~/Library/Developer/Xcode/DerivedData/*/Logs/
        
  lint:
    name: SwiftLint
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: SwiftLint
      uses: norio-nomura/action-swiftlint@3.2.1
      with:
        args: --strict
        
  security-audit:
    name: Security Audit
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Run Package Audit
      run: |
        # Check for known vulnerabilities in dependencies
        swift package audit
        
    - name: Check for Hardcoded Secrets
      run: |
        # Basic check for potential secrets
        if grep -r --include="*.swift" "password\|secret\|key\|token" Sources/ --exclude-dir=.git; then
          echo "Potential hardcoded secrets found"
          exit 1
        fi